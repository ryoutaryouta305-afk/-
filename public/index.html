<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大富豪オンライン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="screen-lobby" class="screen active">
  <div class="lobby-card">
    <div class="crest"><span>大</span></div>
    <h1 class="brand">大富豪<span class="brand-sub">ONLINE</span></h1>
    <p class="tagline">2〜6人・ブラウザだけで対戦・地元ルール完全対応</p>

    <div class="name-row">
      <label>あなたの名前</label>
      <input id="input-name" type="text" maxlength="10" placeholder="なまえ" />
    </div>

    <div class="lobby-actions">
      <button id="btn-create" class="btn btn-primary">部屋を作る</button>
      <div class="divider"><span>または</span></div>
      <div class="join-row">
        <input id="input-roomid" type="text" maxlength="4" placeholder="部屋コード" />
        <button id="btn-join" class="btn btn-secondary">参加する</button>
      </div>
    </div>
    <p id="lobby-error" class="error-text"></p>
    <button id="btn-show-rules-lobby" class="btn-link-rules">📖 ルール一覧を見る</button>
  </div>
</div>

<div id="screen-waiting" class="screen">
  <div class="lobby-card">
    <h2 class="room-code-label">部屋コード</h2>
    <div id="room-code-display" class="room-code"></div>
    <p class="tagline">このコードを友達に共有してね</p>
    <ul id="waiting-players" class="waiting-list"></ul>

    <div class="rules-block">
      <div class="rules-heading">地元ルール</div>
      <div id="rules-panel" class="rules-panel"></div>
      <p id="rules-readonly-hint" class="hint hidden">ルールの変更は部屋主のみ可能です</p>
      <button id="btn-show-rules-waiting" class="btn-link-rules">📖 ルールの説明を見る</button>
    </div>

    <button id="btn-start" class="btn btn-primary" disabled>ゲーム開始</button>
    <p class="hint">※ 開始できるのは部屋主だけ・2〜6人で開始可</p>
    <button id="btn-leave-waiting" class="btn btn-secondary" style="margin-top:10px;">部屋を出る</button>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="table">
    <div class="table-top">
      <div id="round-label" class="round-label"></div>
      <button id="btn-leave-game" class="leave-game-link">退出</button>
      <button id="btn-show-rules-game" class="rules-icon-btn" title="ルール一覧">📖</button>
    </div>

    <div id="opponents" class="opponents"></div>

    <div class="table-center">
      <div id="turn-indicator" class="turn-indicator"></div>
      <div id="revolution-badge" class="revolution-badge hidden">革命</div>
      <div id="field-area" class="field-area"></div>
      <div id="pending-panel" class="pending-panel hidden"></div>
      <div id="log-area" class="log-area"></div>
    </div>

    <div class="table-bottom">
      <div id="my-info" class="my-info"></div>
      <div id="my-hand" class="my-hand"></div>
      <div class="action-row">
        <button id="btn-pass" class="btn btn-secondary">パス</button>
        <button id="btn-play" class="btn btn-primary">出す</button>
      </div>
    </div>
  </div>
</div>

<div id="screen-roundend" class="screen">
  <div class="lobby-card">
    <h2 class="room-code-label">ラウンド結果</h2>
    <ol id="result-list" class="result-list"></ol>
    <button id="btn-next-round" class="btn btn-primary hidden">次のラウンドへ（カード交換）</button>
    <p id="roundend-wait" class="hint hidden">部屋主が次のラウンドを開始するのを待っています…</p>
    <button id="btn-back" class="btn btn-secondary">ロビーに戻る</button>
  </div>
</div>

<div id="screen-exchange" class="screen">
  <div class="lobby-card wide">
    <h2 class="room-code-label">カード交換フェーズ</h2>
    <p id="exchange-status" class="tagline"></p>
    <div id="exchange-hand" class="my-hand exchange-hand"></div>
    <button id="btn-exchange-confirm" class="btn btn-primary hidden">選んだカードを渡す</button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="effect-overlay"></div>

<div id="rules-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>ルール一覧</span>
      <button id="btn-rules-close" class="chat-close">✕</button>
    </div>
    <div id="rules-modal-body" class="modal-body"></div>
  </div>
</div>

<button id="btn-chat-toggle" class="chat-toggle hidden">
  💬<span id="chat-unread" class="chat-unread hidden">0</span>
</button>

<div id="chat-panel" class="chat-panel hidden">
  <div class="chat-header">
    <span>チャット</span>
    <button id="btn-chat-close" class="chat-close">✕</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-row">
    <input id="chat-input" type="text" maxlength="200" placeholder="メッセージを入力…" />
    <button id="btn-chat-send" class="btn btn-primary chat-send">送信</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
